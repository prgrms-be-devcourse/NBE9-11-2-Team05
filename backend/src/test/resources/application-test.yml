spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  expireMillis: 1800000

animal:
  api:
    base-url: https://test.example.com
    service-key: test-key
    return-type: json

CLAUDE_API_KEY: dummy-claude-api-key

cloud:
  aws:
    credentials:
      access-key: dummy-key
      secret-key: dummy-secret
    region:
      static: ap-northeast-2
    s3:
      bucket: test-bucket-name  # <--- 이 부분이 이번 에러의 원인입니다!
    stack:
      auto: false