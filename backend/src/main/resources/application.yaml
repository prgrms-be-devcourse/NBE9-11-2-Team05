spring:
  application:
    name: demo

  profiles:
    active: dev

  output:
    ansi:
      enabled: always

  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

    # db 스키마 자동 생성, 수정 비활성화
    hibernate:
      ddl-auto: none

    show-sql: true

  main:
    banner-mode: console

  # Swagger default MediaType 지정
springdoc:
  default-produces-media-type: application/json ; charset=UTF-8

  # 로그 향상
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE

# 유기 동물 API 설정
animal:
  api:
    base-url: ${ANIMAL_API_BASE_URL}
    service-key: ${ANIMAL_API_SERVICE_KEY}
    return-type: ${ANIMAL_API_RETURN_TYPE:json}

# jwt access token 관련 설정
jwt:
  secret: ${JWT_SECRET}
  expireMillis: ${JWT_EXPIREMILLIS}