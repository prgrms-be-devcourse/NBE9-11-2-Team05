spring:
  application:
    name: pet-meeting

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:13306/my_project_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  output:
    ansi:
      enabled: always

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

    # db 스키마 자동 생성, 수정 비활성화
    hibernate:
      ddl-auto: none

    show-sql: true

  main:
    banner-mode: console

  # Swagger default MediaType 지정
springdoc:
  default-produces-media-type: application/json ; charset=UTF-8

  # 로그 향상
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
  file:
    name: ${LOG_FILE_PATH:logs/application.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

# 유기 동물 API 설정
animal:
  api:
    base-url: ${ANIMAL_API_BASE_URL}
    service-key: ${ANIMAL_API_SERVICE_KEY}
    return-type: ${ANIMAL_API_RETURN_TYPE:json}
    initial-sync-date: 20240101
  sync:
    notification-threshold: ${ANIMAL_SYNC_NOTIFICATION_THRESHOLD:100000}
    github:
      enabled: ${ANIMAL_SYNC_GITHUB_NOTIFY_ENABLED:false}
      owner: ${GITHUB_REPO_OWNER:}
      repo: ${GITHUB_REPO_NAME:}
      issue-number: ${ANIMAL_SYNC_GITHUB_ISSUE_NUMBER:0}
      token: ${GITHUB_TOKEN:}

# jwt access token 관련 설정
jwt:
  secret: ${JWT_SECRET}
  expireMillis: ${JWT_EXPIREMILLIS}
