spring:
  application:
    name: pet-meeting

  profiles:
    active: dev

  output:
    ansi:
      enabled: always

  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

    # db 스키마 자동 생성, 수정 비활성화
    hibernate:
      ddl-auto: update

    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  main:
    banner-mode: console

  # Swagger default MediaType 지정
springdoc:
  default-produces-media-type: application/json ; charset=UTF-8

  # 로그 향상
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE

# 유기 동물 API 설정
animal:
  api:
    base-url: ${ANIMAL_API_BASE_URL}
    service-key: ${ANIMAL_API_SERVICE_KEY}
    return-type: ${ANIMAL_API_RETURN_TYPE:json}

# jwt access token 관련 설정
jwt:
  secret: ${JWT_SECRET}
  expireMillis: ${JWT_EXPIREMILLIS}

# Meta Ads API 설정
meta:
  ads:
    page-id: ${META_PAGE_ID}

# Instagram API 설정
instagram:
  user-id: ${INSTAGRAM_USER_ID}
  access-token: ${INSTAGRAM_ACCESS_TOKEN}

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY}