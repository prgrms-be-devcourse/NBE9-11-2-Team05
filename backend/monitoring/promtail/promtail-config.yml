server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: petmeeting-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: petmeeting-app
          app: petmeeting-backend
          __path__: /var/log/petmeeting/*.log
