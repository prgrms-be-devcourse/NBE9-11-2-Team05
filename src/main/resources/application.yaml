spring:
  application:
    name: demo

    # db 커넥션 설정. 추후 docker 연동
  datasource:
    url:
    username:
    password:
    driver-class-name:

  output:
    ansi:
      enabled: always

  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

    # db 스키마 자동 생성, 수정 비활성화
    hibernate:
      ddl-auto: none

    show-sql: true

  main:
    banner-mode: console

  # Swagger default MediaType 지정
springdoc:
  default-produces-media-type: application/json ; charset=UTF-8

  # 로그 향상
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE

