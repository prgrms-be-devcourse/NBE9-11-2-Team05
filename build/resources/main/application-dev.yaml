spring:
  datasource:
    # localhost 뒤의 포트번호 = yaml에 설정한 13306
    url: jdbc:mysql://localhost:13306/my_project_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true